<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極光小館 - 店家管理後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #3b82f6;
      --accent: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #0f172a;
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1.5rem;
      animation: fadeInDown 0.8s ease-out;
    }

    .header-title h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #a5b4fc, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }

    .header-title p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-info h3 {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-info .value {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-icon {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-card:nth-child(2) .stat-icon {
      background: rgba(59, 130, 246, 0.1);
      color: var(--secondary);
    }

    .stat-card:nth-child(3) .stat-icon {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent);
    }

    /* Orders Grid */
    .orders-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      animation: fadeInUp 0.8s ease-out;
    }

    /* Panel */
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(12px);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Order Cards */
    .admin-orders-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 900px) {
      .admin-orders-list {
        grid-template-columns: 1fr 1fr;
      }
    }

    .admin-order-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s;
      position: relative;
    }

    .admin-order-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.75rem;
    }

    .customer-info h4 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }

    .order-time {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .order-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-new {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .badge-preparing {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .badge-completed {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .order-items-list {
      margin-bottom: 1.5rem;
    }

    .order-item-detail {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    .order-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-total {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-complete {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent);
    }
    .btn-complete:hover {
      background: var(--accent);
      color: white;
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }
    .btn-delete:hover {
      background: var(--danger);
      color: white;
    }

    /* Empty view */
    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
    }

    .empty-state svg {
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(59, 130, 246, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 0.5rem;
      animation: slideInRight 0.3s ease-out;
      font-weight: 500;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>極光小館 後台管理</h1>
        <p>即時訂單監控與營業數據統計中心</p>
      </div>
      <div class="header-actions">
        <a href="order.html" class="btn btn-primary" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          開啟點餐前台
        </a>
      </div>
    </header>

    <!-- Stats Dashboard -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-info">
          <h3>今日總訂單數</h3>
          <div class="value" id="statOrders">0</div>
        </div>
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-info">
          <h3>今日總營業額</h3>
          <div class="value" id="statRevenue">$0</div>
        </div>
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-info">
          <h3>平均客單價</h3>
          <div class="value" id="statAverage">$0</div>
        </div>
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/></svg>
        </div>
      </div>
    </div>

    <!-- Active Orders Panel -->
    <div class="orders-grid">
      <section class="panel">
        <div class="section-header">
          <h2 class="section-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            即時訂單排程 Board
          </h2>
        </div>

        <div class="admin-orders-list" id="adminOrdersContainer">
          <div class="empty-state" id="adminEmptyState">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <p>目前尚無任何點單資訊</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="adminToast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M22 12H12"/></svg>
    <span id="toastMsg">訂單已完成更新</span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      onSnapshot, 
      query, 
      orderBy,
      doc,
      deleteDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 您的 Firebase Web App 配置
    const firebaseConfig = {
      projectId: "antigravity-gv-2026",
      appId: "1:607169033032:web:f43f029e859aa04c84b97d",
      storageBucket: "antigravity-gv-2026.firebasestorage.app",
      apiKey: "AIzaSyDNY-KpeAqcH7AViC_zTawF0dai2jkifvU",
      authDomain: "antigravity-gv-2026.firebaseapp.com",
      messagingSenderId: "607169033032"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ordersColRef = collection(db, "orders");

    // UI elements
    const adminOrdersContainer = document.getElementById('adminOrdersContainer');
    const adminEmptyState = document.getElementById('adminEmptyState');
    const statOrders = document.getElementById('statOrders');
    const statRevenue = document.getElementById('statRevenue');
    const statAverage = document.getElementById('statAverage');
    const toast = document.getElementById('adminToast');
    const toastMsg = document.getElementById('toastMsg');

    // 顯示通知
    function showToast(msg) {
      toastMsg.textContent = msg;
      toast.style.display = 'flex';
      setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    // 監聽所有點單
    const q = query(ordersColRef, orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
      // 1. 更新數據統計卡片
      let count = snapshot.size;
      let revenue = 0;
      
      // 備份現有的卡片（以防重新繪製時遺失）
      adminOrdersContainer.innerHTML = '';

      if (snapshot.empty) {
        adminOrdersContainer.appendChild(adminEmptyState);
        statOrders.textContent = '0';
        statRevenue.textContent = '$0';
        statAverage.textContent = '$0';
        return;
      }

      adminEmptyState.style.display = 'none';

      snapshot.forEach(docSnap => {
        const orderId = docSnap.id;
        const order = docSnap.data();
        revenue += order.totalAmount || 0;

        // 格式化時間
        let timeStr = '未知時間';
        if (order.timestamp) {
          const date = order.timestamp.toDate();
          timeStr = date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // 建立訂單卡片
        const orderCard = document.createElement('div');
        orderCard.className = 'admin-order-card';
        
        // 渲染品項明細
        const itemsHtml = order.items.map(item => `
          <div class="order-item-detail">
            <span>${item.name} x ${item.count}</span>
            <span>$${item.price * item.count}</span>
          </div>
        `).join('');

        // 判斷狀態，新建立的預設為 "new"
        const orderStatus = order.status || 'new';
        let badgeClass = 'badge-new';
        let badgeText = '新訂單';
        let actionBtnHtml = '';

        if (orderStatus === 'new') {
          badgeClass = 'badge-new';
          badgeText = '新訂單';
          actionBtnHtml = `<button class="btn-action btn-complete" data-id="${orderId}" data-action="prepare">開始製作</button>`;
        } else if (orderStatus === 'preparing') {
          badgeClass = 'badge-preparing';
          badgeText = '製作中';
          actionBtnHtml = `<button class="btn-action btn-complete" data-id="${orderId}" data-action="complete">出餐完成</button>`;
        } else if (orderStatus === 'completed') {
          badgeClass = 'badge-completed';
          badgeText = '已完成';
        }

        orderCard.innerHTML = `
          <div>
            <div class="order-header">
              <div class="customer-info">
                <h4>${order.customerName}</h4>
                <div class="order-time">下單時間：${timeStr}</div>
              </div>
              <span class="order-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="order-items-list">
              ${itemsHtml}
            </div>
          </div>
          <div class="order-footer">
            <div class="order-total">$${order.totalAmount}</div>
            <div class="action-buttons">
              ${actionBtnHtml}
              <button class="btn-action btn-delete" data-id="${orderId}">刪除訂單</button>
            </div>
          </div>
        `;

        // 綁定按鈕事件
        const btnAct = orderCard.querySelector('.btn-complete');
        if (btnAct) {
          btnAct.addEventListener('click', async () => {
            const act = btnAct.getAttribute('data-action');
            const docRef = doc(db, "orders", orderId);
            if (act === 'prepare') {
              await updateDoc(docRef, { status: 'preparing' });
              showToast("訂單已設為製作中！");
            } else if (act === 'complete') {
              await updateDoc(docRef, { status: 'completed' });
              showToast("訂單已完成出餐！");
            }
          });
        }

        const btnDel = orderCard.querySelector('.btn-delete');
        btnDel.addEventListener('click', async () => {
          if (confirm(`確認刪除 ${order.customerName} 的訂單嗎？`)) {
            await deleteDoc(doc(db, "orders", orderId));
            showToast("訂單已成功刪除！");
          }
        });

        adminOrdersContainer.appendChild(orderCard);
      });

      // 更新統計板
      statOrders.textContent = count.toString();
      statRevenue.textContent = `$${revenue}`;
      const avg = count > 0 ? Math.round(revenue / count) : 0;
      statAverage.textContent = `$${avg}`;
    }, (error) => {
      console.error("Firestore error: ", error);
    });
  </script>
</body>
</html>
